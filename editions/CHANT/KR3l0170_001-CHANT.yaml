body:
  text: 全一卷全一卷建康小史曹著見廬山夫人夫人命女婉出與著相見女欣然命婢瓊枝令取琴出婉撫琴而歌曰登廬山兮鬱嵯峨晞陽風兮排紫霞欣良運兮暢雲柯矯雲龍兮樂太和琴歌既畢婉便回去祖臺志怪袁真在豫州遣女妓紀陵送薛郭馬三妓與桓宣武馬遂生桓南郡續搜神記齊惠公妾蕭同叔子生子棄之有貍乳而鸇覆之取而養之字曰無野是為頃公代有齊國搜神記宋何恢為廣州刺史有妓曰張耀美而有寵將之任要權貴阮佃夫飲設樂佃夫見耀華悅之頻求於恢曰恢可得此人不可得也佃夫怒拂衣出戶曰惜指失掌遂諷有司以公事彈恢坐免南史霍去病父仲孺孺河東人以縣吏給事平陽侯家與侍女衛小兒私通生去病仲孺吏畢歸家娶婦生光因絕不相聞久之去病為驃騎大將軍擊匈奴道出河東河東太守郊迎至平陽邸舍遣吏迎仲孺趨入拜謁將軍迎拜因跪曰去病不早知為大人遺體也仲孺叩頭曰老臣得託命將軍此天力也去病為仲孺大貿田宅奴婢而去戚苑晉賈后召愍懷太子入朝置于別室遣婢陳舜賜太子酒三升太子辭而不能飲舜逼之曰不孝也天賜汝酒而不飲中有惡物耶太子不得已強飲遂大醉又令小婢承福以紙筆授太子使書之曰陛下不自了吾當入了之字半不成后補成之呈帝廢太子王隱晉書孫綽韓非靈語責李中書曰建元元年六月余家婢辟邪夜眠如夢囈語半時云忽有一老公著黃練巾身短衣長甚自矜厲瞑目切齒云吾是刑名先生韓非弟子李充日習吾業綜習吾書云云孫綽集晉泰始二年使使持節兼五官中郎將宗正丞司馬恢拜崇陽園妾李琰為脩華王宣為脩容徐琰為脩儀吳淑為婕妤趙珽為充華十年使太常洛陽令司馬啟拜采女胡方為貴嬪又使御史中丞太子舍人司馬誕拜采女劉瑗為淑妃臧曜為淑媛趙祭為脩容陳秀為脩容咸寧三年拜美人左嬪為修儀邢蘭為婕妤朱姜為容華晉起居注宋元兇劭姊東陽公主應閤婢王鸚鵡南史魏文帝宮中侍女所絕寵者有莫瓊樹薛夜來陳尚衣段巧笑四人崔豹古今注唐進士段何太和八年賃居臥病有四人負金碧而從二青衣一雲髻一半髻皆絕色說諭再三何終不應乃以紅牋題詩一篇置何樓上而去其詩云樂廣清嬴經幾年妊娘相托不論錢輕盈妙質歸何處惆悵碧樓紅玉鈿書跡柔媚亦無姓名紙末惟書一我字何自此疾日退河東記南陽張不疑開成四年應宏詞寓京師以錢六萬置青衣鴉鬟垂耳曰春條善書音旨清婉有所指使無不愜適又潛為小詩曰幽室鏁妖艷無人蘭蕙芳春風三十載不盡羅衣香不疑素禮門徒尊師者謂不疑曰郎君有邪氣不疑令作法春條撲然作聲視之一朽冥器耳背上題曰春條其衣服若蟬殼然博異志武德中曹惠為江州參軍官舍佛堂中有二木偶人長尺餘工飾甚巧因持歸與稚兒戲稚兒食木偶引手請之惠問曰爾何時物頗能作怪曰輕素與輕紅是宣城謝太守家備偶且曰廬山神要索輕素等為舞姬久矣請命畫工賜以粉黛惠令工人為飾之輕素笑曰此度非論舞妓亦當為彼夫人矣幽怪錄崔紫雲兵部李尚書樂妓詞華清峭眉目端麗李公罷鎮北都為尹東洛時方家妓盛列諸府有宴臺官不赴杜紫微時為分司御史過公有宴故留南行一位待之為訪諸妓併歸北行三重而坐宴將醉杜公輕騎而來連引三觥顧北行回顧主人曰嘗聞有能篇詠紫雲者今日方知名不虛得儻垂一惠無以加焉諸妓皆回頭掩笑杜作詩曰華堂今日綺筵開誰召分司御史來忽發狂言驚滿座三重粉面一時回詩罷升車嚲鞚而歸李公尋以紫雲送贈之紫雲臨行獻詩曰從來學得斐然詞不料霜臺御史知愁見便教隨命去戀恩腸斷出門時竇梁賓夷門人詞筆容態皆可觀進士盧東表念其才藻緣而錄之嘗為嘉東表及第詩云曉粧初罷眼初瞤小玉驚人踏破裙手把紅牋書一紙上頭名字有郎君又有雨中看牡丹詩東風未放曉泥乾紅藥花開不奈寒待得天晴花已老不如攜手雨中看程洛賓長水人為京兆參軍李華所錄自安史亂常分飛南北華後為江州牧登庾樓見中流沿棹有鼓胡琴者李喪色而言曰振絃者宛如故舊令問之乃岳陽郡民王氏之舟詢其操絃者是所錄侍人也王氏尋令抱四絃而至李轉加凄楚問其姓對云是隴西李氏父曾為京掾自祿山之亂父倉皇劍外母程氏乃流落襄陽父母俱有才學所著篇章常記心口因誦數篇乃李公往年親制泫然流涕且問洛賓所在投絃再拜嗚咽而對曰已為他室矣李嘆曰是知父子之性雖間而親骨肉之情不期而會便令歸宅揖王君別求淑姬齎幣詣洛賓使回洛賓寄詩曰魚鴈回時寫報音難憑冰蘗數年心雖然情斷沙吒後爭奈平生怨恨深已上女舞圖唐右司郎中馮翊喬知之有美妾曰碧玉知之為之不昏武承嗣借以教諸姬遂留不還知之作綠珠怨詩以寄之碧玉赴井死承嗣得詩於裙帶大怒諷酷吏羅告族誅之資治通鑑貞元中進士賈全虛者黜於春官春深臨御溝而坐忽見一花流至全虛之前以手接之香馥頗異旁連數葉上有詩一首筆蹟纖麗言詞幽怨詩曰一入深宮裏無由得見春題詩花葉上寄與接流人全虛得之悲想其人涕泗交墜不能離溝上街吏頗疑其事白金吾奏其實德宗亦為感動令中人細詢之乃於翠筠宮奉恩院王才人養女鳳兒者詰其由云初從母學文選初學記及慕陳後主孔貴嬪為詩數日前臨水折花偶為宮思今敗露死無所逃德宗為之惻然召全虛授金吾衛兵曹以鳳兒賜之車載其院資皆賜全虛焉經行寺僧行蘊灑掃堂殿見所畫女人姿顏妖冶戲曰世間女人得如此者我必作妻其夕有款扉者蓮花娘子來從一侍婢妖姿麗質妙絕人倫蓮花顧侍婢曰露仙可準備幃帳天水趙旭家于廣陵夢一青衣挑笑窗牖間及覺忽有清香滿室有一女子年可十四五容範曠代笑曰吾天上青童久居清禁時有世念帝罰下人間感配於君子時叩柱清歌曰白雲飄飄星漢斜獨行窈窕浮雲車通幽記唐韋諷家于汝潁間遣小童理草鋤地忽見人髮鋤漸深漸多而不亂諷異之即掘深尺餘乃一婦人肌膚容色儼然如生再拜言曰某是郎君之祖女奴名曰麗質娘子嫉妬生埋此園中開元中有士人從洛陽道見一女子容服鮮麗泣謂曰已非人昆明池神之女嫁劍閣神之子夫婦不和無由得白父母故欲送書一封耳士人問其處女曰池西有斜柳樹君可叩之若呼阿青當有人從水中出士人入京便送書池上果有此樹叩之頻喚阿青俄見幼婢從水中出得書甚喜曰久不得小娘子消息延士人入謂曰君後日可蹔至此如期果有女子從水中出手持真珠一笥笑以授士人云已上會昌解頤集趙王鎔命馬或使于燕劉守光命韓定辭館之時燕之酒妓轉轉者一代名姝無比韓之所眷也每當酒席馬頻目之韓曰昔文公分季隗於趙衰伯符輟小喬於公瑾蓋惟名色可奉名人所慮倡婦不勝賢者顧骲願垂一詠故得奉之或即命筆授毫文不停綴作轉轉之賦其首曰玳筵既啟雅樂斯陳霧卷羅幕花攢錦茵有西園之上客命南國之佳人貌逞嬋娟縱玉韻而傾國步移縹緲蹴羅襪以生塵或載以歸劉崇遠耳目記穆員稱其麗雲善歌聽之使人醉者醒醒者醉悲者樂樂者悲聲音能移人為工穆員集柳條女奴也成都米市橋偽蜀時有柳條家酒肆蓋當時皆以當壚者為名柳條偶得患沉綿經歲俟死而已有一道士常來貰酒柳條每加勤奉乃留丹數粒柳條初服一粒疾起能食再服能行終服充盛如初成都古今記元公鎮南海日疽發於鬢氣息惴然忽有一少年道士直來床前謂元曰本師知公病遣某將少膏藥來可傳之元公寵姬號靜君收藥貼之至暮而愈失道士所在劉公嘉話韋洵美先輩開平歲及第受鄴都從事辟焉乃挈所寵素娥行羅紹威聞其姝麗才達臨河令女使齎二百疋及生餼而露意焉洵美無所容足遂令粧束更衣修緘獻之素娥姓崔氏亦大梁良家子善諧謔筆札和淚作詩曰妾閉閑房君路岐妾心君恨兩依依魂神儻遇巫娥伴猶逐朝雲暮雨歸洵美乃不受辟夜度河宿一寺長吁而寢曰何處人能報不平寺有行者排闥而揖曰先輩蓄何不平事洵美具語之歘然出門而去至三更忽擲一皮囊入門乃貯素娥而至侵曉問寺僧言在寺打鐘瑾苦三十餘年已不知所之洵美即遁跡他所燈下閑笑小東長沙之妓人以能詩得幸於馬氏後國入為郡窮於京師里而人絕不知余憫其老詢長沙宮中事則必南望泣涕而後言因為作小東詩焉薛九江南富家子得侍宮中善歌嵇康嵇康江南曲名也學舞於鐘離氏建業破零落於江北予遇於洛陽福善坊趙春舍飲酣於是歌嵇康其詞即後主所製焉嘗感激坐人皆泣春舉酒請舞謝曰老矣腰腕衰硬無復舊熊乃強起小舞終曲而罷座有王生者請予為嵇康小舞詞曰薛九三十侍中郎蘭香花熊生春堂龍盤王氣變秋霧淮聲哭月浮秋霜宜城酒煙濕羈腹與君強舞當時曲玉樹遺辭莫重聽黃塵染鬢無前綠我聞襄陽白銅鞮荒情古艷傳幽悲淒涼不抵亡國恨座中苦淚飛柔絲洛陽公子擎銀觴跪奴和曲生玄光茂陵旅夢無春早彤管含羞裁短章已上錢易集王霞卿者藍田人才華清贍節行尤高進士鄭殷彝旅於會稽寓唐安寺樓見粉壁間有題云瑯琊王氏霞卿光啟三年陽春二月登于是閤臨軒軫恨覩物增悲雖觀煥爛之華但比淒涼之色時有輕綃捧硯小玉看題其詩曰春來引步強尋游恨覩煙霄簇寺樓舉目盡為停待景雙眉不覺自如鉤鄭子依韻繼之曰題詩仙子此曾遊應是尋春別鳳樓賴得從來未相識免交錦帳對銀鉤霞卿乃故邑宰韓嵩自京師挈之任所嵩緣遇暴冠而卒鄭子怡然而往謁之霞卿竟辭以疾不見只令總角婢子輕綃持詩以贈之詩曰君是煙霄折桂身聖朝方切詔良臣正堪西上投知己何必留程見婦人鄭得詩抱慚而去女仙圖王琨父懌不辨菽麥時以為殷道矜之流人無肯與婚家以獠婢恭心侍之遂生琨初名崑崙懌後娶樂玄無子故以琨為名立以為嗣南史王藻尚宋文帝第六女臨川長公主諱英瑗公主性妬而藻別愛左右人吳崇祖主讒之於廢帝藻下獄死主與王氏離婚南史寵姐寧王愛姬王宴客妓妾皆在獨寵姐無得見者李太白恃酒強之迺設七寶簾使寵姐隔簾而歌唐史
